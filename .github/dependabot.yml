version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 3
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
      lint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint*"
      web-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "gradle"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 3
    groups:
      jjwt:
        patterns:
          - "io.jsonwebtoken:*"
      spring:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework*"
          - "org.springdoc:*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "kapt"
      gradle-tooling:
        patterns:
          - "org.gradle.toolchains.foojay-resolver-convention"
    ignore:
      - dependency-name: "org.springframework.boot*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.springdoc:springdoc-openapi-starter-webmvc-ui"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "kapt"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.jetbrains.kotlin*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"
