name: Image Verify (develop)

# develop 대상 PR 중 이미지 빌드에 영향 주는 경로가 바뀐 경우에만 Docker 빌드를 검증한다.
# 배경: 프로덕션 이미지 빌드 결함은 main PR 전용 image-verify 만으로는 릴리스 직전에야 발견된다.
# main 대상 PR 은 기존 image-verify.yml 이 경로 무관 전체 검증한다(릴리스 게이트).

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/Dockerfile*"
      - "apps/web/Dockerfile*"
      - "apps/web/next.config.ts"
      - "apps/web/package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "apps/api/build.gradle.kts"
      - "apps/api/settings.gradle.kts"
      - ".github/workflows/image-verify-develop.yml"

permissions:
  contents: read

concurrency:
  group: image-verify-develop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image-verify:
    name: ${{ matrix.app }} image
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - app: api
            context: apps/api
            file: apps/api/Dockerfile.prod
            build-args: ""
          - app: web
            context: .
            file: apps/web/Dockerfile.prod
            build-args: NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ci-build-placeholder.invalid' }}
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'dasida-ci-placeholder' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-${{ matrix.app }}
          tags: type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 한국어 잡 요약
        if: always()
        env:
          APP: ${{ matrix.app }}
          RESULT: ${{ job.status }}
        run: |
          {
            echo "## 📦 ${APP} 이미지 빌드 검증"
            echo ""
            if [ "$RESULT" = "success" ]; then
              echo "✅ 프로덕션 Dockerfile 빌드 통과 (push 없음 — 검증 전용)."
            elif [ "$RESULT" = "cancelled" ]; then
              echo "🚫 취소됨 — 새 푸시로 대체되었거나 타임아웃입니다. 빌드 오류가 아닙니다."
            else
              echo "❌ 이미지 빌드 실패 — Dockerfile·빌드 인자·의존성 설치 단계를 확인하세요."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
