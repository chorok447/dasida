name: CD

# main merge push: CI workflow 성공 후에만 Docker Hub push (workflow_run 게이트).
# main 대상 PR 의 image build 검증은 image-verify.yml 이 담당한다.
# 실제 서버 배포 step 은 provider 확정 후 image push 뒤에 추가한다.
# DOCKERHUB_USERNAME(Variable), DOCKERHUB_TOKEN(Secret) — push job 에서만 사용.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # main push 의 CI 가 성공했을 때만 Docker Hub push. CI 실패 시 이미지가 나가지 않는다.
  image-push:
    name: ${{ matrix.app }} image
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api
            context: apps/api
            file: apps/api/Dockerfile.prod
            build-args: ""
          - app: web
            context: .
            file: apps/web/Dockerfile.prod
            build-args: NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ci-build-placeholder.invalid' }}
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v7
        with:
          # CI 를 통과한 바로 그 커밋을 빌드한다(트리거 시점의 main HEAD 와의 race 방지).
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "sha=sha-${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-${{ matrix.app }}:${{ steps.tag.outputs.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-${{ matrix.app }}:main
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
