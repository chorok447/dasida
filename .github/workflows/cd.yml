name: CD

# CD 골격. 실제 배포 provider 는 아직 미확정이라 trigger/guard/skeleton 만 둔다.
# - main 대상 PR: dry-run(deploy plan) 만. 실제 배포·production secret 사용 안 함.
# - main merge push: production deploy placeholder(echo). provider 확정 후 실제 step 추가.
# develop 대상 PR/push 에서는 실행되지 않는다(아래 branches 에 main 만 둔다).
# fork PR secret 노출 위험 때문에 pull_request_target 은 사용하지 않는다.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

# 기본 최소 권한. 필요한 job 에서만 상향한다.
permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # main 대상 Ready PR: 배포 계획/검증만. 실제 production 배포·secret 사용 금지.
  deploy-plan:
    name: deploy plan (main PR dry-run)
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Deploy plan (dry-run, no deploy)
        # 값은 env 로 주입해 run 에 ${{ }} 직접 보간을 피한다(injection 안전 패턴).
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "CD dry-run for PR #$PR_NUMBER -> main"
          echo "이 job 은 배포 계획/아티팩트 검증만 수행한다. 실제 배포는 하지 않는다."
          # TODO(provider 확정 후): 배포 아티팩트 빌드 + deploy plan/diff 출력 추가.
          # 이 job 에서는 production secret 을 사용하지 않는다(fork PR 노출 방지).

  # main merge push 에서만: production deploy placeholder.
  cd-production:
    name: production deploy (main push)
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # environment: production   # provider 확정 후 승인/보호 규칙(secret 스코프 포함) 연결
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Production deploy (placeholder)
        # 값은 env 로 주입해 run 에 ${{ }} 직접 보간을 피한다(injection 안전 패턴).
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Production deploy placeholder for $COMMIT_SHA on main"
          echo "TODO: 배포 provider 확정 후 실제 deploy step 추가."
          # 실제 배포 시 secret 은 이 production job 에서만 사용한다. 예:
          #   env:
          #     DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          # pull_request(deploy-plan) job 에서는 production secret 을 사용하지 않는다.
