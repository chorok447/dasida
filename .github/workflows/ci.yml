name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
    # labeled: 라벨을 나중에 달아도 CI+자동 머지가 다시 평가되도록 기본 타입에 추가한다.
    types: [opened, synchronize, reopened, labeled]

# 같은 브랜치/PR에서 새 푸시가 오면 진행 중 실행을 취소한다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Next.js 빌드 캐시: 소스가 바뀌면 갱신, 아니면 복원해 재빌드 단축.
      - uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm --filter web lint
      - run: pnpm --filter web build

  api:
    name: api (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Build
        working-directory: apps/api
        run: ./gradlew build --no-daemon

  # web/api 두 검사가 모두 통과하고 PR에 'automerge' 라벨이 있을 때만 merge commit 으로 자동 머지.
  # 무료 플랜 프라이빗 repo 라 GitHub 네이티브 auto-merge(브랜치 보호) 대신 이 잡으로 대체한다.
  automerge:
    name: auto-merge
    needs: [web, api]
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --merge --delete-branch
