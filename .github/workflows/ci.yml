name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

# 같은 브랜치/PR에서 새 푸시가 오면 진행 중 실행을 취소한다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Next.js 빌드 캐시: 소스가 바뀌면 갱신, 아니면 복원해 재빌드 단축.
      - uses: actions/cache@v6
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm --filter web lint
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  # 회원가입→글 작성→피드 핵심 경로 스모크. web 프로덕션 빌드 + api bootRun 을 Playwright webServer 가 띄운다.
  e2e:
    name: e2e (smoke)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: dasida
          MYSQL_USER: dasida
          MYSQL_PASSWORD: dasida
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web e2e
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  api:
    name: api (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Build
        working-directory: apps/api
        run: ./gradlew build --no-daemon

  # develop 대상 Ready PR은 web/api 검사 통과 후 자동 머지한다.
  # main 대상 PR은 release/deploy gate 이므로 자동 머지하지 않는다(CI + container image build 검증만).
  #   main merge 는 수동 승인 후 수행하고, main push 시 Docker Hub image push 가 발생한다(container-images.yml).
  # Dependabot PR은 의존성 검증을 CI에서 돌리되 자동 머지는 하지 않는다(수동 검증 후 처리).
  # Draft PR과 push workflow에서는 auto-merge job을 실행하지 않는다.
  automerge:
    name: auto-merge
    needs: [web, api, e2e]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'app/dependabot' &&
      github.base_ref == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    steps:
      - name: Inspect PR merge state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          echo "PR #$PR merge diagnostics"
          gh pr view "$PR" \
            --json number,title,isDraft,mergeable,mergeStateStatus,reviewDecision,baseRefName,headRefName,headRefOid,author \
            --jq '.'

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --merge --delete-branch
