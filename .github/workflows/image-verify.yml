name: Image Verify

# main 대상 PR: Docker image build 검증만(push=false). Docker Hub login 없음.
# production secret 을 사용하지 않는다. 실제 push 는 cd.yml(main push CI 성공 후).

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: image-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image-verify:
    name: ${{ matrix.app }} image
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - app: api
            context: apps/api
            file: apps/api/Dockerfile.prod
            build-args: ""
          - app: web
            context: .
            file: apps/web/Dockerfile.prod
            build-args: NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ci-build-placeholder.invalid' }}
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'dasida-ci-placeholder' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-${{ matrix.app }}
          tags: type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 한국어 잡 요약
        if: always()
        env:
          APP: ${{ matrix.app }}
          RESULT: ${{ job.status }}
        run: |
          {
            echo "## 📦 ${APP} 이미지 빌드 검증"
            echo ""
            if [ "$RESULT" = "success" ]; then
              echo "✅ 프로덕션 Dockerfile 빌드 통과 (push 없음 — 검증 전용)."
            elif [ "$RESULT" = "cancelled" ]; then
              echo "🚫 취소됨 — 새 푸시로 대체되었거나 타임아웃입니다. 빌드 오류가 아닙니다."
            else
              echo "❌ 이미지 빌드 실패 — Dockerfile·빌드 인자·의존성 설치 단계를 확인하세요."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
