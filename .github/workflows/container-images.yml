name: Container Images

# main 대상 PR: Docker image build 검증만(push=false).
# main merge push: GHCR push. develop 대상 PR/push 에서는 실행되지 않는다.
# 실제 서버 배포는 미구현(CD workflow placeholder). pull_request_target 미사용.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PUSH_IMAGES: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  api-image:
    name: api image
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main' &&
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.PUSH_IMAGES == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/chorok447/dasida-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main,enable=${{ env.PUSH_IMAGES == 'true' }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile.prod
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web-image:
    name: web image
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main' &&
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.PUSH_IMAGES == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/chorok447/dasida-web
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main,enable=${{ env.PUSH_IMAGES == 'true' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ci-build-placeholder.invalid' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
