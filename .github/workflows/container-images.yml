name: Container Images

# main 대상 PR: Docker image build 검증만(push=false). Docker Hub login 없음.
# main merge push: Docker Hub push. develop 대상 PR/push 에서는 실행되지 않는다.
# 실제 서버 배포는 미구현(CD workflow placeholder). pull_request_target 미사용.
# DOCKERHUB_USERNAME(Variable), DOCKERHUB_TOKEN(Secret) — main push job 에서만 사용.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-image:
    name: api image
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'dasida-ci-placeholder' }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-api
          tags: type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile.prod
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  api-image-push:
    name: api image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main

      - uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web-image:
    name: web image
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'dasida-ci-placeholder' }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-web
          tags: type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ci-build-placeholder.invalid' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web-image-push:
    name: web image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/dasida-web
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ci-build-placeholder.invalid' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
