app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# 테스트는 H2 인메모리(MySQL 호환 모드). Docker 불필요.
# 마이그레이션 SQL 은 MySQL 전용이므로 테스트에서는 Flyway 를 끄고 Hibernate create-drop 을 유지한다.
spring.flyway.enabled=false
spring.datasource.url=jdbc:h2:mem:dasida;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
app.jwt.secret=test-secret-test-secret-test-secret-32!!
app.jwt.ttl-millis=86400000
app.jwt.refresh-ttl-millis=1209600000

# Actuator 노출 정책(운영과 동일하게 테스트에서도 고정): health 만 노출, details 미노출.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=false

# CI/단위 테스트는 Redis 없이 in-memory rate limit. 기존 auth 테스트가 한 IP 버킷을 공유하지 않도록 여유 limit.
app.rate-limit.enabled=true
app.rate-limit.store=memory
app.rate-limit.auth.login.limit=10000
app.rate-limit.auth.signup.limit=10000
app.rate-limit.content.comment.limit=10000
app.rate-limit.content.report.limit=10000

app.upload.dir=${java.io.tmpdir}/dasida-test-uploads
app.upload.public-base-url=http://localhost:8080
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
