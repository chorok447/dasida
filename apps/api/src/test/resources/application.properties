app.web-origin=http://localhost:3000

# 테스트는 H2 인메모리(MySQL 호환 모드). Docker 불필요.
spring.datasource.url=jdbc:h2:mem:dasida;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
app.jwt.secret=test-secret-test-secret-test-secret-32!!
app.jwt.ttl-millis=86400000
