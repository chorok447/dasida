spring.application.name=api

# CORS. local/dev/test 기본 허용 origin(Next.js 개발 서버). prod 는 application-prod.yml 에서 override.
# 나머지(methods/headers/credentials/max-age)는 CorsProperties 기본값 사용.
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# MySQL (docker-compose). 환경변수로 오버라이드 가능.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dasida}
spring.datasource.username=${DB_USER:dasida}
spring.datasource.password=${DB_PASSWORD:dasida}
# 스키마는 Flyway(db/migration)가 관리한다. Hibernate 는 검증만 수행(암묵적 스키마 변경 금지).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway: 이미 테이블이 있는 DB(기존 로컬/운영)는 V1 을 실행하지 않고 baseline 처리,
# 빈 DB 는 V1__baseline.sql 부터 순서대로 적용한다.
spring.flyway.baseline-on-migrate=true

# JWT. 운영에서는 반드시 환경변수로 주입(최소 32바이트).
app.jwt.secret=${JWT_SECRET:dev-insecure-secret-change-me-32bytes-minimum!!}
# access token TTL. refresh token 도입으로 24h → 30m 단축(만료 시 프론트가 refresh 로 자동 갱신).
app.jwt.ttl-millis=${JWT_TTL_MS:1800000}
# refresh token TTL(14일). httpOnly 쿠키(dasida_refresh, Path=/api/auth)로만 전달·rotation 적용.
app.jwt.refresh-ttl-millis=${JWT_REFRESH_TTL_MS:1209600000}
# 인증 쿠키 Secure 속성. 로컬 http 개발은 false, prod(HTTPS)는 application-prod.yml 에서 true.
app.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}

# 로그아웃 access token denylist store. rate limit 과 동일하게 기본 in-memory, compose local 은 redis.
app.auth.denylist.store=memory

# Actuator 노출 정책: health 만 web 노출(env/beans/configprops/mappings 등 민감 endpoint 미노출).
# health details/components 는 외부 응답에 노출하지 않는다. SecurityConfig 에서 /actuator/health 만 public.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Redis-compatible store. local 프로파일(compose)에서만 host/port 주입. 테스트·기본 기동은 Redis health 비활성.
management.health.redis.enabled=false

# Auth rate limit. 기본은 in-memory store(테스트·호스트 dev). compose local 은 redis store.
app.rate-limit.enabled=true
app.rate-limit.store=memory
app.rate-limit.auth.login.limit=20
app.rate-limit.auth.login.window-seconds=60
app.rate-limit.auth.signup.limit=10
app.rate-limit.auth.signup.window-seconds=60
app.rate-limit.content.comment.limit=20
app.rate-limit.content.comment.window-seconds=60
app.rate-limit.content.report.limit=10
app.rate-limit.content.report.window-seconds=60
