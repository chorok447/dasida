spring.application.name=api

# CORS. local/dev/test 기본 허용 origin(Next.js 개발 서버). prod 는 application-prod.yml 에서 override.
# 나머지(methods/headers/credentials/max-age)는 CorsProperties 기본값 사용.
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# MySQL (docker-compose). 환경변수로 오버라이드 가능.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dasida}
spring.datasource.username=${DB_USER:dasida}
spring.datasource.password=${DB_PASSWORD:dasida}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT. 운영에서는 반드시 환경변수로 주입(최소 32바이트).
app.jwt.secret=${JWT_SECRET:dev-insecure-secret-change-me-32bytes-minimum!!}
app.jwt.ttl-millis=${JWT_TTL_MS:86400000}

# Actuator: health 만 노출(나머지 endpoint 미노출). SecurityConfig 에서 /actuator/health 만 public.
management.endpoints.web.exposure.include=health
