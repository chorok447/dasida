# local 프로파일(compose.local.yml API 컨테이너). Redis-compatible store(Valkey) 연결.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
# Redis 장애 감지용 timeout. 기본값(Lettuce command timeout 60초)이면 store 장애 시 fail-open/closed 가
# 60초 뒤에야 발동해 요청이 오래 hang 한다. 1초로 단축해 장애를 수 초 내 감지·정책 발동시킨다(정책 자체는 불변).
spring.data.redis.timeout=1s
spring.data.redis.connect-timeout=1s

# 연결 확인용. /actuator/health 응답 body 에 components 는 노출하지 않는다(show-details=never).
management.health.redis.enabled=true

app.rate-limit.store=redis
app.auth.denylist.store=redis
app.dm.ws.fanout=redis
