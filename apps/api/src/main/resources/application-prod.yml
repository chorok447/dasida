# prod 프로파일 전용 설정.
# 운영 환경에서는 API 문서를 외부에 노출하지 않는다. springdoc endpoint 자체를 비활성화해
# /v3/api-docs, /swagger-ui/** 가 404 가 되도록 한다. (SecurityConfig 의 permitAll 은 그대로 두어도
# 핸들러가 없어 문서 내용이 노출되지 않는다.) dev/default/test 프로파일에서는 문서가 계속 열린다.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# CORS: 운영 프론트 origin 을 반드시 명시 주입한다(comma-separated 가능). 미설정/‘*’/localhost 는
# CorsProperties.assertProdSafe() 가 기동 시점에 차단한다. dev 기본값(localhost)을 상속하지 않도록 여기서 비운다.
# Redis-compatible store 연결(denylist·rate limit 공유). host 는 기본값 없이 미설정 시 기동 실패(fail-fast)로,
# in-memory 로 조용히 내려앉는 misconfig 를 막는다. port(기본 6379)·password(기본 없음)는 필요 시
# SPRING_DATA_REDIS_PORT / SPRING_DATA_REDIS_PASSWORD env 가 relaxed binding 으로 자동 매핑된다.
# timeout 은 local 과 동일하게 1s: store 장애 시 정책(rate limit fail-open / denylist fail-closed)이
# 수 초 내 발동하게 한다. 정책·key·TTL 은 redis-security-store-policy.md 참조.
spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      timeout: 1s
      connect-timeout: 1s

# 연결 확인용(local 과 동일). health 응답은 show-details=never 라 components 는 노출되지 않는다.
management:
  health:
    redis:
      enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  jwt:
    # 운영은 HTTPS 전제 → 인증 쿠키를 Secure 로 강제한다.
    cookie-secure: true
  # prod 는 공유 Redis store 필수: in-memory 는 인스턴스 로컬이라 다중 replica 에서 공유되지 않고
  # 재기동 시 denylist 가 소실된다(로그아웃 토큰 부활).
  rate-limit:
    store: redis
  auth:
    denylist:
      store: redis
